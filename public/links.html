<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sibahle Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F2;
      --white: #FFFFFF;
      --crimson: #008C68;
      --crimson-soft: rgba(0, 140, 104, 0.07);
      --crimson-border: rgba(0, 140, 104, 0.18);
      --ink: #1F2937;
      --ink-muted: #6B6B6B;
      --ink-faint: #B4B0AB;
      --card-border: rgba(0,0,0,0.07);
      --radius: 13px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 20px 64px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: rise 0.7s ease both;
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-dash {
      width: 24px;
      height: 1.5px;
      background: var(--crimson);
      border-radius: 2px;
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
    }

    .brand-name span { color: var(--crimson); }

    .tagline {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 8px;
    }

    .rule {
      width: 36px;
      height: 2px;
      background: var(--crimson);
      border-radius: 2px;
      margin: 0 auto 36px;
      animation: rise 0.7s 0.08s ease both;
    }

    /* Cards */
    .stack {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 18px;
      background: var(--white);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--ink);
      position: relative;
      overflow: hidden;
      transition: transform 0.22s, box-shadow 0.25s, border-color 0.25s;
    }

    .card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--crimson);
      transform: scaleY(0);
      transform-origin: 50% 50%;
      transition: transform 0.22s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0,0,0,0.09);
      border-color: var(--crimson-border);
    }

    .card:hover::after { transform: scaleY(1); }
    .card:active { transform: scale(0.99); }

    .card:nth-child(1) { animation: rise 0.6s 0.18s ease both; }
    .card:nth-child(2) { animation: rise 0.6s 0.26s ease both; }
    .card:nth-child(3) { animation: rise 0.6s 0.34s ease both; }
    .card:nth-child(4) { animation: rise 0.6s 0.42s ease both; }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--crimson-soft);
      border: 1px solid var(--crimson-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.22s;
    }
    .card:hover .icon { background: rgba(176,32,44,0.13); }

    .icon svg {
      width: 19px; height: 19px;
      stroke: var(--crimson);
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .copy { flex: 1; min-width: 0; }

    .label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.75;
      max-width: 500px;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 2px;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
    }

    .arrow {
      color: var(--crimson);
      font-size: 0.95rem;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    .card:hover .arrow { opacity: 1; transform: translateX(3px); }

    /* Footer */
    .footer {
      margin-top: 44px;
      text-align: center;
      animation: rise 0.6s 0.58s ease both;
    }

    .footer-line {
      width: 1px;
      height: 28px;
      background: var(--ink-faint);
      margin: 0 auto 14px;
      opacity: 0.45;
    }

    .footer p {
      font-size: 0.67rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="logo-lockup">
      <div class="logo-dash"></div>
      <h1 class="brand-name">Sibahle <span>Digital</span></h1>
      <div class="logo-dash"></div>
    </div>
    <p class="tagline">Building Tomorrow's Africa, Today</p>
  </header>

  <div class="rule"></div>

  <nav class="stack">

    <a class="card" href="https://www.sibahledigital.co.za" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="copy">
        <div class="label">Our Company</div>
        <div class="title">Sibahle Digital</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="https://www.churchflowonline.co.za" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2v4M10 4h4M6 22V12a6 6 0 0 1 12 0v10"/>
          <path d="M4 22h16"/>
        </svg>
      </div>
      <div class="copy">
        <div class="label">Church Management App</div>
        <div class="title">ChurchFlow</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="https://noahx24.github.io/studypartner/" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div class="copy">
        <div class="label">AI Study Companion</div>
        <div class="title">StudyPartner</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <form class="card" action="https://www.payfast.co.za/eng/process" method="post">

      <!-- PayFast required fields -->
      <input type="hidden" name="return_url" value="https://www.sibahledigital.co.za/links">
      <input required type="hidden" name="cmd" value="_paynow">
      <input required type="hidden" name="receiver" pattern="[0-9]" value="18164611">
      <input type="hidden" name="item_name" value="Donations">
      <input type="hidden" name="return_url" value="https://www.sibahledigital.co.za/links">
      <input type="hidden" name="cancel_url" value="https://www.sibahledigital.co.za/links">

      <!-- Amount input (styled, no table) -->
      <div style="display:flex; flex-direction:column; gap:8px; flex:1;">
        <div class="label">Support Our Work</div>
        <div class="title">Donate via PayFast</div>

        <input
          id="PayFastAmount"
          type="number"
          name="amount"
          step="0.01"
          min="5"
          placeholder="Enter amount (e.g. 10.00)"
          required
          style="
            height:42px;
            border-radius:10px;
            border:1px solid rgba(0,0,0,0.1);
            padding:0 12px;
            font-family: inherit;
            outline:none;
          "
        />
      </div>

      <!-- Icon -->
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>

      <span class="arrow">→</span>

      <!-- Full-card click -->
      <button type="submit" style="
        position:absolute;
        inset:0;
        opacity:0;
        cursor:pointer;
      "></button>

    </form>
 </nav>

  <footer class="footer">
    <div class="footer-line"></div>
    <p>© 2026 Sibahle Digital &nbsp;·&nbsp;</p>
  </footer>

</div>
</body>
</html>
